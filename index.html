<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ポケモン あさのしたく！</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'M PLUS Rounded 1c', 'Hiragino Sans', sans-serif;
    background: #1a1a2e;
    min-height: 100vh;
    padding: 16px 12px;
    overflow-x: hidden;
    position: relative;
  }
  /* ポケモン風の草原背景 */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 50% 120%, #2d5a27 0%, transparent 60%),
      radial-gradient(ellipse at 20% 80%, #1e6b3a 0%, transparent 40%),
      radial-gradient(ellipse at 80% 90%, #1e6b3a 0%, transparent 40%),
      linear-gradient(180deg, #87CEEB 0%, #5ba3d9 30%, #3a7bd5 50%, #2d5a27 65%, #1a4020 100%);
    z-index: -1;
  }
  /* 雲 */
  .cloud {
    position: fixed;
    background: rgba(255,255,255,0.8);
    border-radius: 50px;
    z-index: 0;
    animation: cloud-float linear infinite;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.8);
    border-radius: 50%;
  }
  .cloud1 { width: 80px; height: 28px; top: 8%; left: -80px; animation-duration: 25s; }
  .cloud1::before { width: 36px; height: 36px; top: -18px; left: 14px; }
  .cloud1::after { width: 24px; height: 24px; top: -10px; left: 42px; }
  .cloud2 { width: 60px; height: 22px; top: 14%; left: -60px; animation-duration: 35s; animation-delay: 8s; }
  .cloud2::before { width: 28px; height: 28px; top: -14px; left: 10px; }
  .cloud2::after { width: 20px; height: 20px; top: -8px; left: 32px; }
  @keyframes cloud-float {
    from { transform: translateX(-100px); }
    to { transform: translateX(calc(100vw + 100px)); }
  }

  .header {
    text-align: center;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }
  /* モンスターボール風プログレス */
  .pokeball-title {
    display: inline-block;
    width: 36px; height: 36px;
    background: linear-gradient(180deg, #ff1a1a 0%, #ff1a1a 45%, #333 45%, #333 55%, #fff 55%, #fff 100%);
    border-radius: 50%;
    border: 3px solid #333;
    position: relative;
    vertical-align: middle;
    margin: 0 6px;
  }
  .pokeball-title::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    background: #fff;
    border: 3px solid #333;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .title {
    font-size: 24px;
    font-weight: 900;
    color: #FFD700;
    text-shadow: 2px 2px 0 #b8860b, 0 0 10px rgba(255,215,0,0.5);
    letter-spacing: 3px;
    position: relative;
    z-index: 1;
  }
  .subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    margin-top: 4px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
  }

  /* EXPバー風プログレス */
  .exp-bar-container {
    background: #333;
    border-radius: 12px;
    padding: 3px;
    margin: 12px 0 16px;
    position: relative;
    z-index: 1;
    border: 2px solid #555;
  }
  .exp-bar-label {
    position: absolute;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 10px;
    font-weight: 700;
    color: #8be8fd;
    z-index: 2;
    text-shadow: 1px 1px 0 #000;
  }
  .exp-bar-fill {
    height: 20px;
    background: linear-gradient(90deg, #00b4d8, #48cae4, #90e0ef);
    border-radius: 10px;
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
    box-shadow: 0 0 8px rgba(72,202,228,0.5);
  }
  .exp-bar-text {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    z-index: 2;
    text-shadow: 1px 1px 0 #000;
  }

  .todo-item {
    background: rgba(255,255,255,0.93);
    border-radius: 16px;
    padding: 12px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.5);
    transition: all 0.4s ease;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
    z-index: 1;
    border: 2px solid rgba(0,0,0,0.08);
  }
  .todo-item:active { transform: scale(0.98); }
  .todo-item.done {
    background: rgba(200,255,200,0.85);
    border-color: #27ae60;
  }
  .todo-item.done .task-text {
    text-decoration: line-through;
    color: #888;
  }
  .pokemon-sprite {
    width: 64px;
    height: 64px;
    flex-shrink: 0;
    image-rendering: pixelated;
    transition: transform 0.3s ease;
    filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2));
  }
  .todo-item.done .pokemon-sprite {
    animation: pokemon-happy 0.5s ease;
  }
  @keyframes pokemon-happy {
    0%, 100% { transform: translateY(0); }
    25% { transform: translateY(-8px) rotate(-5deg); }
    75% { transform: translateY(-4px) rotate(5deg); }
  }
  .task-content { flex: 1; }
  .task-text {
    font-size: 18px;
    font-weight: 700;
    color: #333;
    transition: all 0.3s ease;
  }
  .task-sub {
    font-size: 11px;
    color: #888;
    margin-top: 2px;
  }
  .pokemon-name {
    font-size: 10px;
    color: #e74c3c;
    font-weight: 700;
    margin-top: 1px;
  }
  /* モンスターボール風チェック */
  .pokeball-check {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
    background: linear-gradient(180deg, #ff4444 0%, #ff4444 45%, #333 45%, #333 55%, #fff 55%, #fff 100%);
    border: 2px solid #333;
    transition: all 0.3s ease;
    opacity: 0.4;
  }
  .pokeball-check::after {
    content: '';
    position: absolute;
    width: 10px; height: 10px;
    background: #fff;
    border: 2px solid #333;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .todo-item.done .pokeball-check {
    opacity: 1;
    background: linear-gradient(180deg, #27ae60 0%, #27ae60 45%, #333 45%, #333 55%, #fff 55%, #fff 100%);
    animation: pokeball-catch 0.6s ease;
  }
  .todo-item.done .pokeball-check::after {
    background: #FFD700;
    border-color: #b8860b;
    box-shadow: 0 0 6px rgba(255,215,0,0.8);
  }
  @keyframes pokeball-catch {
    0% { transform: rotate(0deg); }
    25% { transform: rotate(-20deg); }
    50% { transform: rotate(20deg); }
    75% { transform: rotate(-10deg); }
    100% { transform: rotate(0deg); }
  }

  /* スパークル */
  .sparkle {
    position: absolute;
    pointer-events: none;
    font-size: 20px;
    animation: sparkle-fly 0.8s ease-out forwards;
    z-index: 10;
  }
  @keyframes sparkle-fly {
    0% { opacity: 1; transform: translate(0, 0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3); }
  }

  /* 全部完了オーバーレイ */
  .complete-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .complete-overlay.show {
    display: flex;
    animation: fadeIn 0.5s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  .complete-message {
    background: linear-gradient(135deg, #fff 0%, #fffde7 100%);
    border-radius: 24px;
    padding: 32px 24px;
    text-align: center;
    max-width: 300px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 30px rgba(255,215,0,0.3);
    animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    border: 3px solid #FFD700;
  }
  @keyframes bounceIn {
    0% { transform: scale(0.3); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .complete-pokemon {
    width: 120px;
    height: 120px;
    image-rendering: pixelated;
    animation: pokemon-bounce 1s ease infinite;
    filter: drop-shadow(3px 3px 3px rgba(0,0,0,0.3));
  }
  @keyframes pokemon-bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .complete-text {
    font-size: 24px;
    font-weight: 900;
    color: #e74c3c;
    margin: 8px 0;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.1);
  }
  .complete-sub {
    font-size: 14px;
    color: #666;
    margin-bottom: 16px;
    line-height: 1.6;
  }
  .level-up {
    font-size: 18px;
    font-weight: 900;
    color: #FFD700;
    text-shadow: 1px 1px 0 #b8860b;
    margin-bottom: 12px;
    animation: level-flash 0.5s ease infinite alternate;
  }
  @keyframes level-flash {
    from { opacity: 0.7; } to { opacity: 1; }
  }
  .reset-btn {
    background: linear-gradient(135deg, #ff4444, #cc0000);
    color: #fff;
    border: none;
    border-radius: 30px;
    padding: 12px 36px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 4px 12px rgba(204,0,0,0.3);
    border: 2px solid #990000;
  }
  .reset-btn:active { transform: scale(0.95); }
</style>
</head>
<body>

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>

<div class="header">
  <div class="title">
    <span class="pokeball-title"></span>
    あさのしたく
    <span class="pokeball-title"></span>
  </div>
  <div class="subtitle">ぜんぶ ゲットだぜ！</div>
</div>

<div class="exp-bar-container">
  <div class="exp-bar-label">EXP</div>
  <div class="exp-bar-fill" id="progressFill"></div>
  <div class="exp-bar-text" id="progressText">0 / 4</div>
</div>

<div id="todoList"></div>

<div class="complete-overlay" id="completeOverlay">
  <div class="complete-message">
    <img class="complete-pokemon" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" alt="Pikachu">
    <div class="level-up">LEVEL UP!</div>
    <div class="complete-text">カンペキ！！</div>
    <div class="complete-sub">きょうも いちにち<br>がんばろう！</div>
    <button class="reset-btn" onclick="resetAll()">もういちど</button>
  </div>
</div>

<script>
const tasks = [
  {
    text: 'はを みがく',
    sub: 'きれいに みがこう！',
    pokemon: 'ゼニガメ',
    // ゼニガメ (水タイプ → 歯磨き)
    sprite: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/7.png',
    color: '#3498db'
  },
  {
    text: 'くつしたを はく',
    sub: 'ひだりとみぎ あってる？',
    pokemon: 'ヒトカゲ',
    // ヒトカゲ (足元あったか)
    sprite: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/4.png',
    color: '#e67e22'
  },
  {
    text: 'ハンカチを もつ',
    sub: 'ポケットに いれた？',
    pokemon: 'フシギダネ',
    // フシギダネ (草タイプ → ハンカチ)
    sprite: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png',
    color: '#27ae60'
  },
  {
    text: 'うわぎを きる',
    sub: 'きょうは さむいよ！',
    pokemon: 'ピカチュウ',
    // ピカチュウ
    sprite: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png',
    color: '#f1c40f'
  },
];

const todoList = document.getElementById('todoList');
let doneState = JSON.parse(localStorage.getItem('kidsTodoPoke') || '[]');
if (doneState.length !== tasks.length) doneState = tasks.map(() => false);

function render() {
  todoList.innerHTML = '';
  let doneCount = 0;
  tasks.forEach((task, i) => {
    const done = doneState[i];
    if (done) doneCount++;
    const div = document.createElement('div');
    div.className = 'todo-item' + (done ? ' done' : '');
    div.innerHTML =
      '<img class="pokemon-sprite" src="' + task.sprite + '" alt="' + task.pokemon + '">' +
      '<div class="task-content">' +
        '<div class="task-text">' + task.text + '</div>' +
        '<div class="task-sub">' + task.sub + '</div>' +
        '<div class="pokemon-name">' + task.pokemon + (done ? ' ゲット！' : ' が おうえん！') + '</div>' +
      '</div>' +
      '<div class="pokeball-check"></div>';
    div.addEventListener('click', function() { toggle(i, div); });
    todoList.appendChild(div);
  });
  var pct = (doneCount / tasks.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = doneCount + ' / ' + tasks.length;
  localStorage.setItem('kidsTodoPoke', JSON.stringify(doneState));
  if (doneCount === tasks.length) {
    setTimeout(function() {
      document.getElementById('completeOverlay').classList.add('show');
    }, 600);
  }
}

function toggle(index, element) {
  doneState[index] = !doneState[index];
  if (doneState[index]) {
    var emojis = ['\u2B50','\u2728','\uD83C\uDF1F','\uD83D\uDCAB','\uD83C\uDF1F','\u2764\uFE0F'];
    for (var j = 0; j < 6; j++) {
      var s = document.createElement('span');
      s.className = 'sparkle';
      s.textContent = emojis[j];
      s.style.left = (30 + Math.random() * 40) + '%';
      s.style.top = '50%';
      s.style.setProperty('--tx', (Math.random() * 120 - 60) + 'px');
      s.style.setProperty('--ty', (Math.random() * -80 - 20) + 'px');
      element.appendChild(s);
      (function(el) { setTimeout(function() { el.remove(); }, 800); })(s);
    }
  }
  render();
}

function resetAll() {
  doneState = tasks.map(function() { return false; });
  document.getElementById('completeOverlay').classList.remove('show');
  render();
}

render();
</script>
</body>
</html>
